<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Swarm Intelligence Hero Banner</title>
  <desc id="desc">Animated hero banner for Swarm Intelligence, a GGUF-first local agent orchestration system.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="180" y1="80" x2="930" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <linearGradient id="cardGrad" x1="0" y1="0" x2="280" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="progressGrad" x1="18" y1="132" x2="262" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="320" rx="28" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <path d="M80 40V280" stroke="#FFFFFF"/>
    <path d="M160 40V280" stroke="#FFFFFF"/>
    <path d="M240 40V280" stroke="#FFFFFF"/>
    <path d="M320 40V280" stroke="#FFFFFF"/>
    <path d="M400 40V280" stroke="#FFFFFF"/>
    <path d="M480 40V280" stroke="#FFFFFF"/>
    <path d="M560 40V280" stroke="#FFFFFF"/>
    <path d="M640 40V280" stroke="#FFFFFF"/>
    <path d="M720 40V280" stroke="#FFFFFF"/>
    <path d="M800 40V280" stroke="#FFFFFF"/>
    <path d="M880 40V280" stroke="#FFFFFF"/>
    <path d="M960 40V280" stroke="#FFFFFF"/>
    <path d="M1040 40V280" stroke="#FFFFFF"/>
    <path d="M1120 40V280" stroke="#FFFFFF"/>

    <path d="M40 80H1160" stroke="#FFFFFF"/>
    <path d="M40 140H1160" stroke="#FFFFFF"/>
    <path d="M40 200H1160" stroke="#FFFFFF"/>
    <path d="M40 260H1160" stroke="#FFFFFF"/>
  </g>

  <!-- Animated routing lines -->
  <g opacity="0.24">
    <path d="M40 258C170 164 300 120 420 144C548 170 650 256 782 244C924 232 1038 130 1160 72"
          stroke="url(#accentLine)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-dasharray="8 10">
      <animate attributeName="stroke-dashoffset" from="0" to="-72" dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M22 220C192 134 322 104 444 134C570 166 670 240 810 222C944 204 1050 126 1180 42"
          stroke="url(#accentLine)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-dasharray="10 12">
      <animate attributeName="stroke-dashoffset" from="0" to="72" dur="5.5s" repeatCount="indefinite"/>
    </path>

    <path d="M70 100C215 90 302 114 412 150C534 188 650 214 758 198C874 180 972 122 1082 94"
          stroke="url(#accentLine)"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-dasharray="7 9">
      <animate attributeName="stroke-dashoffset" from="0" to="-60" dur="6.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Glow dots -->
  <g>
    <circle cx="220" cy="170" r="5" fill="#7DD3FC" filter="url(#softGlow)">
      <animate attributeName="cx" values="220;260;220" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="170;145;170" dur="4.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="305" cy="136" r="4.5" fill="#67E8F9" filter="url(#softGlow)">
      <animate attributeName="cx" values="305;360;305" dur="5.1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="136;164;136" dur="5.1s" repeatCount="indefinite"/>
    </circle>

    <circle cx="390" cy="184" r="5" fill="#34D399" filter="url(#softGlow)">
      <animate attributeName="cx" values="390;454;390" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="184;146;184" dur="4.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="476" cy="144" r="4.5" fill="#93C5FD" filter="url(#softGlow)">
      <animate attributeName="cx" values="476;548;476" dur="5.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="144;176;144" dur="5.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="562" cy="186" r="5" fill="#22D3EE" filter="url(#softGlow)">
      <animate attributeName="cx" values="562;640;562" dur="4.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="186;144;186" dur="4.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Left icon / swarm core -->
  <g transform="translate(86 82)">
    <circle cx="52" cy="78" r="48" fill="#0F172A" stroke="#1F2937" stroke-width="2"/>
    <circle cx="52" cy="78" r="28" fill="none" stroke="#60A5FA" stroke-width="2.5" opacity="0.95" stroke-dasharray="5 6">
      <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="78" r="16" fill="none" stroke="#22D3EE" stroke-width="2.2" opacity="0.95" stroke-dasharray="4 5">
      <animate attributeName="stroke-dashoffset" from="0" to="36" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="78" r="5" fill="#34D399" filter="url(#softGlow)"/>

    <circle cx="14" cy="34" r="4" fill="#60A5FA"/>
    <circle cx="92" cy="28" r="4" fill="#22D3EE"/>
    <circle cx="104" cy="76" r="4" fill="#34D399"/>
    <circle cx="80" cy="122" r="4" fill="#60A5FA"/>
    <circle cx="24" cy="126" r="4" fill="#22D3EE"/>
    <circle cx="2" cy="80" r="4" fill="#34D399"/>

    <path d="M14 34L52 78L92 28L104 76L80 122L52 78L24 126L2 80L52 78"
          stroke="url(#accentLine)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.8"/>
  </g>

  <!-- Text block -->
  <g transform="translate(210 78)">
    <text x="0" y="34"
          fill="#FFFFFF"
          font-size="42"
          font-weight="700"
          font-family="Inter, Segoe UI, Arial, sans-serif">
      Swarm Intelligence
    </text>

    <text x="0" y="70"
          fill="#93C5FD"
          font-size="19"
          font-weight="600"
          font-family="Inter, Segoe UI, Arial, sans-serif">
      The GGUF-First Orchestrator
    </text>

    <text x="0" y="118"
          fill="#D1D5DB"
          font-size="18"
          font-family="Inter, Segoe UI, Arial, sans-serif">
      Hierarchical local agents for planning, execution, critique, memory,
    </text>

    <text x="0" y="146"
          fill="#D1D5DB"
          font-size="18"
          font-family="Inter, Segoe UI, Arial, sans-serif">
      and runtime-safe coordination on real consumer hardware.
    </text>

    <text x="0" y="190"
          fill="#9CA3AF"
          font-size="15"
          font-family="Inter, Segoe UI, Arial, sans-serif">
      Local-first · Multi-agent · Quantized models · Structured reflection
    </text>
  </g>

  <!-- Runtime card -->
  <g transform="translate(835 66)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="292" height="188" rx="22" fill="url(#cardGrad)" stroke="#1F2937"/>

    <rect x="18" y="18" width="104" height="28" rx="8" fill="#111827" stroke="#1F2937"/>
    <text x="33" y="37" fill="#E5E7EB" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">
      Runtime Loop
    </text>

    <rect x="18" y="62" width="78" height="24" rx="12" fill="#172554"/>
    <text x="35" y="78" fill="#BFDBFE" font-size="12" font-family="Inter, Segoe UI, Arial, sans-serif">
      Planner
    </text>

    <rect x="106" y="62" width="82" height="24" rx="12" fill="#083344"/>
    <text x="126" y="78" fill="#A5F3FC" font-size="12" font-family="Inter, Segoe UI, Arial, sans-serif">
      Executor
    </text>

    <rect x="198" y="62" width="68" height="24" rx="12" fill="#052E2B"/>
    <text x="216" y="78" fill="#A7F3D0" font-size="12" font-family="Inter, Segoe UI, Arial, sans-serif">
      Critic
    </text>

    <path d="M55 103C90 124 132 124 161 103C190 84 223 84 248 103"
          stroke="url(#accentLine)"
          stroke-width="3"
          stroke-linecap="round"
          stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="0" to="-56" dur="3.2s" repeatCount="indefinite"/>
    </path>

    <rect x="18" y="132" width="244" height="22" rx="11" fill="#111827"/>
    <rect x="18" y="132" width="146" height="22" rx="11" fill="url(#progressGrad)">
      <animate attributeName="width" values="96;186;146;208;146" dur="5s" repeatCount="indefinite"/>
    </rect>

    <text x="18" y="176" fill="#9CA3AF" font-size="12" font-family="Inter, Segoe UI, Arial, sans-serif">
      Context · VRAM · Process Safety · Local Models
    </text>
  </g>

  <!-- Bottom subtle border -->
  <rect x="1" y="1" width="1198" height="318" rx="27" stroke="rgba(255,255,255,0.08)"/>
</svg>
